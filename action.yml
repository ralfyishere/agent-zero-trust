name: "agent-zero-trust scan"
description: "Zero-trust repo intake for AI coding agents: fail on known-shape injection/execution risks in the instruction environment before an agent (or a reviewer) trusts the tree."
branding:
  icon: "shield"
  color: "red"
inputs:
  path:
    description: "Directory to scan"
    required: false
    default: "."
  fail-on:
    description: "Severity that fails the job: high, medium, or any"
    required: false
    default: "high"
  version:
    # Defaults to the package version that ships with THIS action tag, so
    # `uses: ...@vX.Y.Z` pins the scanner to X.Y.Z by default. Set explicitly
    # to override, or "latest" to always use the newest PyPI release.
    description: "agent-zero-trust version from PyPI (default: matches this action tag)"
    required: false
    default: "0.1.5"
runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        V="${{ inputs.version }}"
        if [ -z "$V" ] || [ "$V" = "latest" ]; then SPEC="agent-zero-trust";
        else SPEC="agent-zero-trust==$V"; fi
        pipx run --spec "$SPEC" azt scan "${{ inputs.path }}" --fail-on "${{ inputs.fail-on }}"
