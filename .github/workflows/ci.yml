name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: corpus + unit tests (incl. false-positive and known-miss ledgers)
        run: python test_azt.py
      - name: self-scan (dogfoods .azt-ignore for detector/fixture files)
        run: python azt.py scan . --fail-on high
      - name: demo scan must fail on the malicious fixture
        run: |
          if python azt.py scan corpus/malicious-markdown; then
            echo "malicious fixture passed the scan — regression"; exit 1
          fi
      - name: package builds
        run: python -m pip install --quiet build && python -m build

  action-dogfood:
    # Tests the composite action's WIRING (inputs -> pipx -> scan -> exit code)
    # against the latest PUBLISHED package. The scanner logic itself is tested
    # on the local tree by the `test` jobs above. version: latest is required
    # because CI runs on push, before this tree's version is published.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: action passes on the benign fixture
        uses: ./
        with:
          path: corpus/benign-repo
          version: latest
      - name: action fails on the malicious fixture
        id: mal
        uses: ./
        continue-on-error: true
        with:
          path: corpus/malicious-markdown
          version: latest
      - name: assert the failure happened
        run: test "${{ steps.mal.outcome }}" = "failure"

  action-published-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: the action works for strangers via the published tag
        uses: ralfyishere/agent-zero-trust@v0.1.2
        with:
          path: corpus/benign-repo
