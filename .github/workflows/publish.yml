name: Publish to PyPI

# Trusted Publishing: no API token anywhere. PyPI trusts this exact
# repo + workflow + environment via OIDC. Triggered by publishing a
# GitHub Release (or manually for a dry-run build check).
on:
  release:
    types: [published]
  workflow_dispatch:

# Least privilege for every job; the publish job re-grants id-token: write
# for OIDC trusted publishing (job-level permissions replace this block).
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install build && python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
